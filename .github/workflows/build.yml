name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v4

      - name: 🔧 تثبيت Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: ☕ تثبيت Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 تجهيز Android SDK (API 33)
        uses: android-actions/setup-android@v2
        with:
          api-level: 33
          build-tools: 33.0.2
          target: android-33

      - name: 📚 تثبيت حزم npm
        run: npm install

      - name: 📋 نسخ مكتبات Capacitor إلى www/js
        run: |
          mkdir -p www/js
          cp node_modules/@capacitor/core/dist/capacitor.js www/js/
          cp node_modules/@capacitor/app/dist/plugin.js www/js/app-plugin.js
          cp node_modules/@capacitor/local-notifications/dist/plugin.js www/js/local-notifications-plugin.js
          cp node_modules/@capawesome-team/capacitor-foreground-service/dist/plugin.js www/js/foreground-service-plugin.js

      - name: ⚙️ إضافة مشروع أندرويد
        run: |
          npx cap add android

      - name: 🔒 إضافة صلاحيات Android (Foreground Service, Notifications)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/manifest>/i \
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />\
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          sed -i '/<\/application>/i \
          <service android:name="com.capawesome.capacitor.foregroundservice.ForegroundService" android:foregroundServiceType="dataSync" android:exported="false" />' "$MANIFEST"
          echo "✅ تم تعديل AndroidManifest.xml"

      - name: 🏗️ بناء الـ APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع الـ APK كـ Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fessala-app-debug 
          path: android/app/build/outputs/apk/debug/app-debug.apk

name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 استنساخ المستودع
        uses: actions/checkout@v3

      - name: 🔧 تثبيت Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 تثبيت Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 تجهيز Android SDK
        uses: shogo82148/actions-setup-android@v1
        with:
          api-level: 33
          build-tools: 33.0.2
          target: android-33

      - name: 📚 تثبيت حزم npm
        run: npm install

      - name: 📋 نسخ مكتبات Capacitor إلى www/js
        run: |
          mkdir -p www/js
          cp node_modules/@capacitor/core/dist/capacitor.js www/js/
          cp node_modules/@capacitor/app/dist/plugin.js www/js/app-plugin.js
          cp node_modules/@capacitor/local-notifications/dist/plugin.js www/js/local-notifications-plugin.js
          cp node_modules/@capawesome/capacitor-foreground-service/dist/plugin.js www/js/foreground-service-plugin.js

      - name: ⚙️ تهيئة Capacitor ومشروع أندرويد
        run: |
          npx cap init "تطبيق الفصالة" "com.diaa.fessala" --web-dir=www
          npx cap add android

      - name: 🔒 إضافة صلاحيات Android (Foreground Service, Notifications, Service)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # إضافة الصلاحيات قبل </manifest>
          sed -i '/<\/manifest>/i \
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\
          <uses-permission android:name="android.permission.FOREGROUND_SERVICE_DATA_SYNC" />\
          <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          # إضافة تعريف الخدمة الأمامية قبل </application>
          sed -i '/<\/application>/i \
          <service android:name="com.capawesome.capacitor.foregroundservice.ForegroundService" android:foregroundServiceType="dataSync" android:exported="false" />' "$MANIFEST"
          # التأكد من أن compileSdkVersion و targetSdkVersion على الأقل 33 (سيتكفل بهما actions-setup-android)
          echo "✅ تم تعديل AndroidManifest.xml"

      - name: 🏗️ بناء الـ APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 رفع الـ APK كـ Artifact
        uses: actions/upload-artifact@v3
        with:
          name: fessala-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
